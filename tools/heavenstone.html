}

function getReason(stone, classKey) {
  const ck = CLASS_KEYS[classKey] || 'default';
  return stone.reason[ck] || stone.reason['default'] || '通用推荐';
}

// ==================== RENDER ====================
function render() {
  const classVal = document.getElementById('classSelect').value;
  const playstyle = document.querySelector('#playstyleToggle .toggle-btn.active').getAttribute('data-value');
  const checkedSlots = Array.from(document.querySelectorAll('#slotGroup input[type="checkbox"]:checked')).map(cb => cb.value);
  const query = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = STONES.slice();

  // Filter by slot type
  if (checkedSlots.length > 0) {
    filtered = filtered.filter(s => checkedSlots.includes(s.type));
  }

  // Filter by search
  if (query) {
    filtered = filtered.filter(s => s.name.includes(query) || s.stats.toLowerCase().includes(query) || s.type.includes(query));
  }

  // Sort by tier priority
  const tierOrder = { S: 0, A: 1, B: 2 };
  filtered.sort((a, b) => {
    const aScore = getScore(a, classVal, playstyle);
    const bScore = getScore(b, classVal, playstyle);
    if (aScore !== bScore) return bScore - aScore;
    return tierOrder[a.tier] - tierOrder[b.tier];
  });

  const grid = document.getElementById('resultGrid');
  const count = document.getElementById('resultCount');
  count.textContent = `共 ${filtered.length} 个推荐结果`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="hs-empty"><div class="icon">&#x1F50D;</div><p>没有找到匹配的天堂之石，请调整筛选条件</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(s => {
    const score = getScore(s, classVal, playstyle);
    const reasonText = classVal ? getReason(s, classVal) : '适用于所有职业的' + TYPE_LABELS[s.type];
    const tierDot = s.tier;

    return `<div class="hs-card">
      <div class="hs-card-header">
        <div>
          <div class="name">${s.name}</div>
          <span class="type-badge ${TYPE_BADGE_CLASS[s.type]}">${TYPE_LABELS[s.type]}</span>
        </div>
        <div class="tier ${TIER_CLASS[s.tier]}">${s.tier}</div>
      </div>
      <div class="stats">
        <div class="stat"><strong>${s.stats}</strong></div>
        <div class="stat">适配评分: ${score}<span style="color:var(--text-muted);font-size:0.75rem">/100</span></div>
      </div>
      <div class="obtain">&#x1F4E6; ${s.obtain}</div>
      <div class="reason">&#x1F4A1; ${reasonText}</div>
    </div>`;
  }).join('');
}

// ==================== EVENTS ====================
// Class select
document.getElementById('classSelect').addEventListener('change', render);

// Playstyle toggle
document.querySelectorAll('#playstyleToggle .toggle-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#playstyleToggle .toggle-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    render();
  });
});

// Slot type checkboxes
document.querySelectorAll('#slotGroup input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', render);
});

// Search
document.getElementById('searchInput').addEventListener('input', render);

// ==================== HAMBURGER ====================
document.getElementById('hamburger').addEventListener('click', function() {
  document.getElementById('nav').classList.toggle('open');
});

// ==================== BACK TO TOP ====================
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', function() {
  if (window.scrollY > 300) {
    backTop.classList.add('show');
  } else {
    backTop.classList.remove('show');
  }
});
backTop.addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ==================== INIT ====================
render();
</script>
</body>
</html>
